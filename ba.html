<!DOCTYPE html>
<html>
<head>
<title>My Biya</title>
</head>
<body style="text-align:center;font-family:sans-serif">

<h1 id="result"></h1>

<script>
let params = new URLSearchParams(window.location.search);
let name = params.get("name");

let texts = [
"এর বউয়ের সাথে সারাদিন ঝগড়া হবে 😆",
"এর বউ কথা শুনবে না 😂",
"বিয়ের পর খুব রোমান্টিক হবে ❤️",
"বউ অনেক আদর করবে 😍"
];

let random = texts[Math.floor(Math.random()*texts.length)];

if(name){
document.getElementById("result").innerText = name + " " + random;
}else{
document.getElementById("result").innerText = "নাম দিয়ে আবার চেষ্টা করুন";
}
</script>

</body>
</html>
